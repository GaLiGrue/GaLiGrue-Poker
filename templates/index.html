<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            margin:0;
            height:100vh;

            background:
            linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.6)),
            url("{{ url_for('static', filename='Background.jpg') }}");

            background-size:cover;
            background-position:center;

            display:flex;
            justify-content:center;
            align-items:center;

            font-family:Arial, sans-serif;
        }

        .card-box{
            width:420px;

            background:rgba(255,255,255,0.1);
            backdrop-filter:blur(15px);

            border:1px solid rgba(255,255,255,0.2);

            border-radius:20px;

            padding:40px;

            color:white;

            box-shadow:0 8px 30px rgba(0,0,0,.3);
        }

        .nav-pills .nav-link{
            color:white;
            border-radius:10px;
        }

        .nav-pills .nav-link.active{
            background:white;
            color:black;
        }

        .form-control{
            background:rgba(255,255,255,0.15);
            border:none;
            color:white;
        }

        .form-control:focus{
            background:rgba(255,255,255,0.2);
            color:white;
            box-shadow:none;
        }

        .form-control::placeholder{
            color:#ddd;
        }

        .btn-custom{
            width:100%;
            border:none;
            padding:12px;
            border-radius:12px;

            background:white;
            color:black;
            font-weight:bold;

            transition:0.3s;
        }

        .btn-custom:hover{
            transform:translateY(-2px);
            background:#e9e9e9;
        }

    </style>
</head>
<body>

<div class="card-box">

    <ul class="nav nav-pills nav-justified mb-4">
        <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#login">
                Login
            </button>
        </li>

        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="pill" data-bs-target="#register">
                Register
            </button>
        </li>
    </ul>

    <div class="tab-content">

        <!-- LOGIN -->

        <div class="tab-pane fade show active" id="login">

            <form method="POST">

                <input type="hidden" name="action" value="login">

                <div class="mb-3">
                    <input
                        type="email"
                        name="email"
                        class="form-control"
                        placeholder="E-Mail"
                        required
                    >
                </div>

                <div class="mb-3">
                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        placeholder="Passwort"
                        required
                    >
                </div>

                <button class="btn-custom">
                    Einloggen
                </button>

            </form>

        </div>

        <!-- REGISTER -->

        <div class="tab-pane fade" id="register">

            <form method="POST">

                <input type="hidden" name="action" value="register">

                <div class="mb-3">
                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        placeholder="Benutzername"
                        required
                    >
                </div>

                <div class="mb-3">
                    <input
                        type="email"
                        name="email"
                        class="form-control"
                        placeholder="E-Mail"
                        required
                    >
                </div>

                <div class="mb-3">
                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        placeholder="Passwort"
                        required
                    >
                </div>

                <button class="btn-custom">
                    Registrieren
                </button>

            </form>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
