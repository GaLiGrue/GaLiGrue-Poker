<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Main Menu</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            margin:0;
            height:100vh;

            background:
            linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.6)),
            url("{{ url_for('static', filename='Background.jpg') }}");

            background-size:cover;
            background-position:center;

            display:flex;
            justify-content:center;
            align-items:center;

            font-family:Arial, sans-serif;

            overflow:hidden;
        }

        .menu-box{
            width:460px;

            background:rgba(255,255,255,0.1);
            backdrop-filter:blur(15px);

            border:1px solid rgba(255,255,255,0.2);

            border-radius:20px;

            padding:40px;

            color:white;

            text-align:center;

            box-shadow:0 8px 30px rgba(0,0,0,.3);

            transition:0.5s;
        }

        .btn-custom{
            width:100%;
            border:none;
            padding:14px;
            border-radius:12px;

            background:white;
            color:black;

            font-weight:bold;
            font-size:18px;

            margin-top:15px;

            transition:0.3s;
        }

        .btn-custom:hover{
            transform:translateY(-2px);
            background:#e9e9e9;
        }

        #mainMenu{
            display:none;
        }

        .fade-out{
            opacity:0;
            transform:scale(0.95);
        }

        .submenu{
            margin-top:15px;
            padding:15px;
            border-radius:15px;
            background:rgba(255,255,255,0.08);
            display:none;
        }

        .setting-item{
            text-align:left;
            margin-bottom:20px;
        }

        .setting-item label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
        }

        .form-range{
            width:100%;
        }

        .form-check{
            text-align:left;
            margin-top:10px;
        }

        .form-check-input{
            background-color:white;
            border:none;
        }

        .form-check-label{
            margin-left:5px;
        }

        .join-form{
            display:grid;
            grid-template-columns:1fr auto;
            gap:8px;
            margin-top:15px;
        }

        .join-form input{
            min-width:0;
            border:none;
            border-radius:12px;
            padding:0 12px;
            background:rgba(255,255,255,.16);
            color:white;
            text-transform:uppercase;
        }

        .join-form input::placeholder{
            color:#ddd;
        }

        .join-form button{
            border:none;
            border-radius:12px;
            padding:0 14px;
            font-weight:bold;
        }

    </style>
</head>
<body>

    <!-- WELCOME SCREEN -->

    <div class="menu-box" id="welcomeScreen">

        <h1>Willkommen {{ username }}</h1>

        <p class="mt-3">
            Du bist erfolgreich eingeloggt.
        </p>

    </div>

    <!-- MAIN MENU -->

    <div class="menu-box" id="mainMenu">

        <h1>Main Menu</h1>

        <p class="mt-3">
            Wähle eine Option
        </p>

        <!-- PLAY -->

        <button class="btn-custom" onclick="togglePlayMenu()">
            Play
        </button>

        <div class="submenu" id="playMenu">

            <form method="POST" action="{{ url_for('join_game') }}">
                <input type="hidden" name="mode" value="singleplayer">
                <button class="btn-custom">
                    Singleplayer starten
                </button>
            </form>

            <form method="POST" action="{{ url_for('join_game') }}">
                <input type="hidden" name="mode" value="multiplayer">
                <button class="btn-custom">
                    Online Tisch erstellen
                </button>
            </form>

            <form class="join-form" method="POST" action="{{ url_for('join_room') }}">
                <input type="text" name="room_code" placeholder="Raumcode" maxlength="5" required>
                <button>Join</button>
            </form>

        </div>

        <!-- SETTINGS -->

        <button class="btn-custom" onclick="toggleSettingsMenu()">
            Settings
        </button>

        <div class="submenu" id="settingsMenu">

            <div class="setting-item">

                <label>Music Volume</label>

                <input id="musicVolume" type="range" class="form-range" min="0" max="100" value="20">

            </div>

            <div class="setting-item">

                <label>Sound Effects</label>

                <input id="sfxVolume" type="range" class="form-range" min="0" max="100" value="75">

            </div>

            <div class="form-check">

                <input id="soundEnabled" class="form-check-input" type="checkbox" checked>

                <label class="form-check-label">
                    Sounds aktiv
                </label>

            </div>

            <div class="form-check">

                <input id="autoBots" class="form-check-input" type="checkbox" checked>

                <label class="form-check-label">
                    Bots automatisch spielen lassen
                </label>

            </div>

            <div class="form-check">

                <input id="compactTable" class="form-check-input" type="checkbox">

                <label class="form-check-label">
                    Kompakter Tisch
                </label>

            </div>

        </div>

        <!-- LOGOUT -->

        <a href="/logout" class="btn btn-danger mt-4 w-100 rounded-3">
            Logout
        </a>

    </div>

    <script>

        // WILLKOMMEN SCREEN

        setTimeout(() => {

            const welcome = document.getElementById("welcomeScreen");

            welcome.classList.add("fade-out");

            setTimeout(() => {

                welcome.style.display = "none";

                document.getElementById("mainMenu").style.display = "block";

            }, 500);

        }, 5000);


        // PLAY MENU

        function togglePlayMenu(){

            const menu = document.getElementById("playMenu");

            if(menu.style.display === "block"){
                menu.style.display = "none";
            }else{
                menu.style.display = "block";
            }

        }


        // SETTINGS MENU

        function toggleSettingsMenu(){

            const menu = document.getElementById("settingsMenu");

            if(menu.style.display === "block"){
                menu.style.display = "none";
            }else{
                menu.style.display = "block";
            }

        }

        const settingsDefaults = {
            soundEnabled: "true",
            autoBots: "true",
            compactTable: "false",
            sfxVolume: "75",
            musicVolume: "20"
        };

        function bindSetting(id){
            const element = document.getElementById(id);
            if(!element){
                return;
            }
            const savedValue = localStorage.getItem(id) ?? settingsDefaults[id];
            if(element.type === "checkbox"){
                element.checked = savedValue === "true";
                element.addEventListener("change", () => localStorage.setItem(id, element.checked));
            }else{
                element.value = savedValue;
                element.addEventListener("input", () => localStorage.setItem(id, element.value));
            }
        }

        ["soundEnabled", "autoBots", "compactTable", "sfxVolume", "musicVolume"].forEach(bindSetting);

    </script>

</body>
</html>
